<!DOCTYPE html>
<html lang="id">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Instagram Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <h2>Login</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <button onclick="login()">Masuk</button>
</div>

<div id="app">

<!-- TOPBAR -->
<header class="topbar">
    <h2>Instagram</h2>
    <div class="icons">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-paper-plane"></i>
    </div>
</header>

<!-- STORIES -->
<div class="stories">
    <div class="story"><img src="https://i.pravatar.cc/100?img=1"></div>
    <div class="story"><img src="https://i.pravatar.cc/100?img=2"></div>
    <div class="story"><img src="https://i.pravatar.cc/100?img=3"></div>
    <div class="story"><img src="https://i.pravatar.cc/100?img=4"></div>
</div>

<!-- UPLOAD -->
<div class="upload">
    <input type="file" id="fileInput">
    <button onclick="uploadPost()">Upload</button>
</div>

<!-- FEED -->
<section id="feed"></section>

<!-- NAVBAR BAWAH -->
<div class="navbar">
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-regular fa-square-plus"></i>
    <i class="fa-solid fa-film"></i>
    <i class="fa-regular fa-user"></i>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
